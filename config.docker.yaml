server:
  bidding_port: 5160
  streamer_port: 5161
  payment_port: 5162

nats:
  url: nats://nats:4222

database:
  host: licit-postgresql
  port: 5432
  user: licit
  password: LicitDev2024!
  dbname: LicitBiddingDb
  sslmode: disable

redis:
  addr: licit-redis:6379
  password: LicitDev2024!

dotnet:
  wallet_service_url: http://licit-wallet-service:8080
  tendering_service_url: http://licit-tendering-service:8080
  auth_service_url: http://licit-auth-service:8080

jwt:
  secret: DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
  issuer: Licit.AuthService
  audience: Licit.Client

gateway:
  port: 5100
  health_check_interval: 10s
  health_check_timeout: 3s
  routes:
    - name: auth
      match: prefix
      path: /api/auth
      cluster: auth
    - name: tendering
      match: prefix
      path: /api/tender
      cluster: tendering
    - name: wallet
      match: prefix
      path: /api/wallet
      cluster: wallet
    - name: mail
      match: prefix
      path: /api/email
      cluster: mail
    - name: bidding
      match: prefix
      path: /api/v1
      cluster: bidding
    - name: streamer
      match: exact
      path: /ws
      cluster: streamer
    - name: frontend
      match: catch_all
      path: /
      cluster: frontend
  clusters:
    auth:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://licit-auth-service:8080
    tendering:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://licit-tendering-service:8080
    wallet:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://licit-wallet-service:8080
    mail:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://licit-mail-service:8080
    bidding:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://bidding-engine:5160
    streamer:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://auction-streamer:5161
    frontend:
      load_balancing_policy: round_robin
      health_path: /
      destinations:
        - http://host.docker.internal:5173
