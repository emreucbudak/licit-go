server:
  bidding_port: 5160
  streamer_port: 5161
  payment_port: 5162

nats:
  url: nats://localhost:4222

database:
  host: localhost
  port: 5432
  user: licit
  password: LicitDev2024!
  dbname: LicitBiddingDb
  sslmode: disable

redis:
  addr: localhost:6379
  password: LicitDev2024!

dotnet:
  wallet_service_url: http://localhost:5142
  tendering_service_url: http://localhost:5132
  auth_service_url: http://localhost:5122

jwt:
  secret: DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
  issuer: Licit.AuthService
  audience: Licit.Client

gateway:
  port: 5100
  health_check_interval: 10s
  health_check_timeout: 3s
  cors:
    enabled: true
    allowed_origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
    allowed_methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed_headers:
      - Accept
      - Authorization
      - Content-Type
      - Origin
      - X-Request-ID
      - X-Requested-With
    exposed_headers:
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Reset
      - Retry-After
    allow_credentials: true
    max_age: 10m
  rate_limit:
    enabled: true
    bucket_size: 5
    refill_interval: 2s
    key_prefix: licit:gateway:rate_limit
  routes:
    - name: auth
      match: prefix
      path: /api/auth
      cluster: auth
    - name: tendering
      match: prefix
      path: /api/tender
      cluster: tendering
    - name: wallet
      match: prefix
      path: /api/wallet
      cluster: wallet
    - name: mail
      match: prefix
      path: /api/email
      cluster: mail
    - name: bidding
      match: prefix
      path: /api/v1
      cluster: bidding
    - name: streamer
      match: exact
      path: /ws
      cluster: streamer
    - name: frontend
      match: catch_all
      path: /
      cluster: frontend
  clusters:
    auth:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5122
    tendering:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5132
    wallet:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5142
    mail:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5152
    bidding:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5160
    streamer:
      load_balancing_policy: round_robin
      health_path: /health
      destinations:
        - http://localhost:5161
    frontend:
      load_balancing_policy: round_robin
      health_path: /
      destinations:
        - http://localhost:5173
